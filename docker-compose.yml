version: '3.8'

services:
  fnmedia-monitor:
    image: python:3.11-slim
    container_name: fnmedia-monitor
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./database:/app/database:ro
      - ./logs:/app/logs:ro
    environment:
      - FNMEDIA_DB_PATH=/app/database/fnmedia.db
      - LOG_PATH=/app/logs
      - PORT=5000
      - IPINFO_TOKEN=
    working_dir: /app
    command: >
      sh -c "pip install flask requests gunicorn && gunicorn -w 2 -b 0.0.0.0:5000 main:app"
    mem_limit: 200m
    cpu_shares: 512
