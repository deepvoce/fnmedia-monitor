<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>飞牛影视 · 监控</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #eef2f6;
      --ink: #1c1f26;
      --muted: #606875;
      --accent: #2f7bff;
      --line: rgba(255,255,255,0.5);
      --shadow: 0 18px 36px rgba(15, 23, 42, 0.16);
      --glass: rgba(255,255,255,0.55);
      --glass-border: rgba(255,255,255,0.75);
      --glass-highlight: rgba(255,255,255,0.75);
      --bg-solid: #ffffff;
      --bg-bottom: linear-gradient(180deg, #cfe2ff 0%, #e7f1ff 50%, #ffffff 100%);
    }
    [data-theme="dark"] {
      --bg: #0f1116;
      --ink: #e7eaf0;
      --muted: #a0a8b6;
      --accent: #4f8cff;
      --line: rgba(255,255,255,0.18);
      --shadow: 0 22px 44px rgba(0,0,0,0.55);
      --glass: rgba(28,30,36,0.8);
      --glass-border: rgba(255,255,255,0.28);
      --glass-highlight: rgba(255,255,255,0.26);
      --bg-solid: #06090f;
      --bg-bottom: linear-gradient(180deg, #122a5c 0%, #0b1426 55%, #06090f 100%);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Manrope", "Helvetica Neue", Helvetica, Arial, sans-serif;
      letter-spacing: -0.01em;
      background: var(--bg-solid);
      min-height: 100dvh;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background: var(--bg-bottom);
      background-repeat: no-repeat;
      background-size: 100% 100%;
    }
    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 20px 40px;
      position: relative;
      min-height: 100dvh;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .brand-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(79,140,255,0.18);
    }
    .brand h1 { font-size: 20px; font-weight: 700; margin: 0; }
    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }
    .ghost-btn, .toggle {
      background: linear-gradient(180deg, var(--glass-highlight), rgba(255,255,255,0.1)), var(--glass);
      border: 1px solid var(--glass-border);
      color: var(--ink);
      border-radius: 999px;
      padding: 6px 12px;
      cursor: pointer;
      backdrop-filter: blur(22px) saturate(170%);
      -webkit-backdrop-filter: blur(22px) saturate(170%);
    }
    .toggle { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
    .toggle .dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 0 4px rgba(79,140,255,0.2);
    }

    .grid { display: grid; gap: 16px; }
    .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); align-items: stretch; }

    .card {
      background: linear-gradient(180deg, var(--glass-highlight), rgba(255,255,255,0.18)), var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(26px) saturate(175%);
      -webkit-backdrop-filter: blur(26px) saturate(175%);
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: color-mix(in oklab, var(--accent) 35%, var(--glass-border));
      box-shadow: 0 18px 36px rgba(0,0,0,0.2);
    }
    .card-head { padding: 16px 18px 0; font-weight: 600; font-size: 14px; }
    .card-body { padding: 16px 18px 18px; flex: 1; }

    .stat { display: flex; flex-direction: column; gap: 6px; }
    .stat::before {
      content: ""; width: 28px; height: 4px; border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), rgba(79,140,255,0.2));
    }
    .stat .label { color: var(--muted); font-size: 12px; }
    .stat .value { font-size: 22px; font-weight: 700; }

    .pill {
      display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 999px;
      font-size: 12px; background: rgba(255,255,255,0.25); color: var(--muted);
    }
    .count-badge {
      min-width: 28px;
      height: 28px;
      padding: 0 8px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      color: #ffffff;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.55), rgba(255,255,255,0) 45%),
                  linear-gradient(135deg, #cfcfcf 0%, #9fa4ad 55%, #7d818a 100%);
      box-shadow: inset 0 0 8px rgba(255,255,255,0.25);
    }
    [data-theme="dark"] .count-badge {
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.28), rgba(255,255,255,0) 45%),
                  linear-gradient(135deg, #bfc3c9 0%, #8a9099 55%, #666b74 100%);
      color: #ffffff;
    }
    [data-theme="dark"] .meta.time-strong { color: var(--ink); }
    .list { display: flex; flex-direction: column; gap: 10px; }
    .list-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border: 1px solid var(--glass-border); border-radius: 12px;
      background: linear-gradient(180deg, rgba(255,255,255,0.45), rgba(255,255,255,0.18));
      backdrop-filter: blur(24px) saturate(170%);
      -webkit-backdrop-filter: blur(24px) saturate(170%);
    }
    .list-item .meta { color: var(--muted); font-size: 12px; }
    .progress-line { height: 6px; background: rgba(255,255,255,0.2); border-radius: 999px; overflow: hidden; }
    .progress-line > span { display: block; height: 100%; background: var(--accent); border-radius: 999px; }

    .table-lite { width: 100%; border-collapse: collapse; font-size: 13px; }
    .table-lite th, .table-lite td { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.15); text-align: left; }
    .table-lite th { color: var(--muted); font-weight: 600; }
    .title-ellipsis {
      max-width: 110px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: inline-block;
      vertical-align: middle;
    }
    .user-ellipsis {
      max-width: 80px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: inline-block;
      vertical-align: middle;
    }
    .time-cell { white-space: nowrap; }
    .scroll-y {
      overflow-y: auto;
      overflow-x: hidden;
    }
    .progress-cell { min-width: 140px; }
    .progress-wrap { display: flex; align-items: center; gap: 8px; }
    .progress-track {
      width: 50%;
      height: 6px;
      background: rgba(255,255,255,0.22);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-track span {
      display: block;
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
      min-width: 2px;
    }
    .tag {
      padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600;
      background: color-mix(in oklab, var(--accent) 12%, transparent); color: var(--accent);
    }
    .muted { color: var(--muted); }
    .chart-wrap { height: 220px; }

    @media (max-width: 1100px) { .grid-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 720px) {
      .grid-4, .grid-2 { grid-template-columns: 1fr; }
      .topbar { flex-direction: column; align-items: flex-start; gap: 10px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="brand-dot"></div>
        <h1>飞牛影视监控</h1>
      </div>
      <div class="top-actions">
        <span id="lastUpdate">--</span>
        <button class="toggle" id="themeToggle" type="button">
          <span class="dot"></span><span id="themeLabel">浅色</span>
        </button>
        <button class="ghost-btn" onclick="refreshAll()">刷新</button>
      </div>
    </div>

    <div class="grid grid-4">
      <div class="card"><div class="card-body stat"><div class="label">总用户</div><div class="value" id="totalUsers">-</div></div></div>
      <div class="card"><div class="card-body stat"><div class="label">活跃用户</div><div class="value" id="activeUsers">-</div></div></div>
      <div class="card"><div class="card-body stat"><div class="label">今日播放</div><div class="value" id="todayPlays">-</div></div></div>
      <div class="card"><div class="card-body stat"><div class="label">今日时长(小时)</div><div class="value" id="todayWatchTime">-</div></div></div>
    </div>

    <div class="grid grid-2" style="margin-top:16px;">
      <div class="card">
        <div class="card-head">当前观看</div>
        <div class="card-body">
          <div id="currentPlaying" class="list"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-head">播放时段</div>
        <div class="card-body">
          <div class="chart-wrap"><canvas id="hourlyChart"></canvas></div>
        </div>
      </div>
    </div>

    <div class="grid grid-2" style="margin-top:16px;">
      <div class="card">
        <div class="card-head">观看历史</div>
        <div class="card-body scroll-y" id="historyBodyWrap">
          <table class="table-lite">
            <thead>
              <tr>
                <th>用户</th><th>内容</th><th>类型</th><th class="progress-cell">进度</th><th>时间</th>
              </tr>
            </thead>
            <tbody id="historyBody"></tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <div class="card-head">热门内容</div>
        <div class="card-body" id="topContentWrap" style="display:flex; flex-direction:column;">
          <div id="topContent" class="list"></div>
          <div class="muted" id="topContentEmpty" style="display:none;">暂无数据</div>
        </div>
      </div>
    </div>

    <div class="grid grid-2" style="margin-top:16px;">
      <div class="card">
        <div class="card-head">收藏记录</div>
        <div class="card-body" id="favoritesContainer"></div>
      </div>
      <div class="card">
        <div class="card-head">下载记录</div>
        <div class="card-body" id="downloadsContainer"></div>
      </div>
    </div>
  </div>

  <script>
    let hourlyChart = null;

    function initChart(hourlyData) {
      const ctx = document.getElementById('hourlyChart').getContext('2d');
      if (hourlyChart) hourlyChart.destroy();
      hourlyChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: Array.from({length:24},(_,i)=>`${i}`),
          datasets:[{label:'播放',data:hourlyData,backgroundColor:'rgba(79,140,255,0.6)',borderColor:'rgba(79,140,255,1)',borderWidth:1,borderRadius:6}]
        },
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#9aa3b2'}},y:{grid:{color:'rgba(255,255,255,0.12)'},ticks:{color:'#9aa3b2'}}}}
      });
    }

    async function loadStats() {
      const res = await fetch('/api/stats');
      const data = await res.json();
      document.getElementById('totalUsers').textContent = data.total_users||0;
      document.getElementById('activeUsers').textContent = data.active_users||0;
      document.getElementById('todayPlays').textContent = data.today_plays||0;
      document.getElementById('todayWatchTime').textContent = data.today_watch_time||0;

      if (data.top_content && data.top_content.length) {
        document.getElementById('topContent').innerHTML = data.top_content.map((t,i)=>`
          <div class="list-item">
            <div>
              <div>${i+1}. ${t.title}</div>
              <div class="meta">近7天播放</div>
            </div>
            <span class="count-badge">${t.count}</span>
          </div>
        `).join('');
        document.getElementById('topContentEmpty').style.display = 'none';
      } else {
        document.getElementById('topContent').innerHTML = '';
        document.getElementById('topContentEmpty').style.display = 'block';
      }
    }

    async function loadCurrentPlaying() {
      const res = await fetch('/api/current');
      const data = await res.json();
      if (!data.length) {
        document.getElementById('currentPlaying').innerHTML = '<div class="muted">暂无观看</div>';
        return;
      }
      document.getElementById('currentPlaying').innerHTML = data.map(d=>`
        <div class="list-item">
          <div>
            <div>${d.title}</div>
            <div class="meta">${d.user} · ${d.type || '未知'}</div>
            <div class="progress-line" style="margin-top:6px;"><span style="width:${d.progress||0}%;"></span></div>
          </div>
          <div class="meta">${d.position}/${d.duration}</div>
        </div>
      `).join('');
    }

    async function loadHistory() {
      const res = await fetch('/api/history?limit=30');
      const data = await res.json();
      document.getElementById('historyBody').innerHTML = data.map(d=>`
        <tr>
          <td><span class="user-ellipsis" title="${d.user}">${d.user}</span></td>
          <td><span class="title-ellipsis" title="${d.title}">${d.title}</span></td>
          <td><span class="tag">${d.type || '未知'}</span></td>
          <td class="progress-cell">
            <div class="progress-wrap">
              <div class="progress-track"><span style="width:${d.progress||0}%"></span></div>
              <span class="muted">${d.progress || 0}%</span>
            </div>
          </td>
          <td class="muted time-cell">${d.end_time || ''}</td>
        </tr>
      `).join('') || '<tr><td colspan="5" class="muted">暂无数据</td></tr>';
    }


    async function loadFavorites() {
      const res = await fetch('/api/favorites');
      const data = await res.json();
      if (!data.length) {
        document.getElementById('favoritesContainer').innerHTML = '<div class="muted">暂无收藏</div>';
        return;
      }
      document.getElementById('favoritesContainer').innerHTML = data.map(d=>`
        <div class="list-item">
          <div>
            <div>${d.title}</div>
            <div class="meta">${d.user} · ${d.type}</div>
          </div>
          <div class="meta time-strong">${d.add_time || ''}</div>
        </div>
      `).join('');
    }

    async function loadDownloads() {
      const res = await fetch('/api/downloads');
      const data = await res.json();
      if (!data.length) {
        document.getElementById('downloadsContainer').innerHTML = '<div class="muted">暂无下载</div>';
        return;
      }
      document.getElementById('downloadsContainer').innerHTML = data.map(d=>`
        <div class="list-item">
          <div>
            <div>${d.media_file}</div>
            <div class="meta">${d.user} · ${d.resolution || ''}</div>
          </div>
          <div class="meta">${d.status}</div>
        </div>
      `).join('');
    }

    async function refreshAll() {
      await Promise.all([loadStats(), loadCurrentPlaying(), loadHistory(), loadFavorites(), loadDownloads()]);
      const res = await fetch('/api/hourly');
      initChart(await res.json());
      syncHistoryHeight();
      document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
    }

    function syncHistoryHeight() {
      const topWrap = document.getElementById('topContentWrap');
      const historyWrap = document.getElementById('historyBodyWrap');
      const topList = document.getElementById('topContent');
      if (!topWrap || !historyWrap) return;
      let target = 0;
      if (topList) {
        const firstItem = topList.querySelector('.list-item');
        if (firstItem) {
          const itemHeight = firstItem.getBoundingClientRect().height;
          const listStyle = window.getComputedStyle(topList);
          const gap = parseFloat(listStyle.gap || '0');
          target = itemHeight * 10 + gap * 9;
        }
      }
      if (target <= 0) {
        target = topWrap.getBoundingClientRect().height;
      }
      if (target > 0) historyWrap.style.maxHeight = `${Math.round(target)}px`;
    }

    function applyTheme(theme) {
      document.body.setAttribute('data-theme', theme);
      document.getElementById('themeLabel').textContent = theme === 'dark' ? '深色' : '浅色';
    }

    document.addEventListener('DOMContentLoaded', () => {
      const saved = localStorage.getItem('fnmedia_theme');
      const preferred = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      applyTheme(saved || preferred);
      document.getElementById('themeToggle').addEventListener('click', () => {
        const current = document.body.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
        const next = current === 'dark' ? 'light' : 'dark';
        applyTheme(next);
        localStorage.setItem('fnmedia_theme', next);
      });
      refreshAll();
      setInterval(refreshAll, 30000);
      window.addEventListener('resize', syncHistoryHeight);
    });
  </script>
</body>
</html>
